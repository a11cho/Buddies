spring:
  application:
    name: buddies-backend
  config:
    import: optional:file:./config/mail-secrets.yml
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/buddies}
    username: ${SPRING_DATASOURCE_USERNAME:buddies}
    password: ${SPRING_DATASOURCE_PASSWORD:buddies}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  mail:
    properties:
      mail:
        smtp:
          connectiontimeout: ${BUDDIES_MAIL_CONNECTION_TIMEOUT_MS:5000}
          timeout: ${BUDDIES_MAIL_TIMEOUT_MS:5000}
          writetimeout: ${BUDDIES_MAIL_WRITE_TIMEOUT_MS:5000}

server:
  port: ${SERVER_PORT:8443}
  ssl:
    enabled: ${SERVER_SSL_ENABLED:true}
    key-store: ${SERVER_SSL_KEY_STORE:./config/dev-ssl.p12}
    key-store-type: ${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:buddies-local-ssl}
    key-alias: ${SERVER_SSL_KEY_ALIAS:buddies-local}

management:
  endpoints:
    web:
      exposure:
        include: health,info

buddies:
  external-access: true
  storage:
    gcs:
      bucket-name: ${BUDDIES_GCS_BUCKET_NAME:}
      public-base-url: ${BUDDIES_GCS_PUBLIC_BASE_URL:}
      signed-url-expires-minutes: ${BUDDIES_GCS_SIGNED_URL_EXPIRES_MINUTES:15}
  jwt:
    secret: ${BUDDIES_JWT_SECRET:change-this-development-secret-change-this}
  cors:
    allowed-origins: ${BUDDIES_CORS_ALLOWED_ORIGINS:http://localhost:5173,https://localhost:5173}
  mail:
    from: ${BUDDIES_MAIL_FROM:no-reply@buddies.local}
    signup-subject: ${BUDDIES_MAIL_SIGNUP_SUBJECT:Buddies 인증 코드}
    password-reset-subject: ${BUDDIES_MAIL_PASSWORD_RESET_SUBJECT:Buddies 비밀번호 재설정}
    fail-on-send-error: ${BUDDIES_MAIL_FAIL_ON_SEND_ERROR:false}
  admin:
    bootstrap:
      enabled: ${BUDDIES_ADMIN_BOOTSTRAP_ENABLED:true}
      email: ${BUDDIES_ADMIN_BOOTSTRAP_EMAIL:allcho@kaist.ac.kr}
      name: ${BUDDIES_ADMIN_BOOTSTRAP_NAME:Buddies Admin}
      password: ${BUDDIES_ADMIN_BOOTSTRAP_PASSWORD:Admin123!}
