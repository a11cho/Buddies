spring:
  application:
    name: buddies-backend
  config:
    import: optional:file:./config/mail-secrets.yml
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/buddies}
    username: ${SPRING_DATASOURCE_USERNAME:buddies}
    password: ${SPRING_DATASOURCE_PASSWORD:buddies}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

buddies:
  jwt:
    secret: ${BUDDIES_JWT_SECRET:change-this-development-secret-change-this}
  cors:
    allowed-origins: ${BUDDIES_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  mail:
    from: ${BUDDIES_MAIL_FROM:no-reply@buddies.local}
    signup-subject: ${BUDDIES_MAIL_SIGNUP_SUBJECT:Buddies 인증 코드}
