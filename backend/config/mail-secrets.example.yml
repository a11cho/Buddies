spring:
  mail:
    host: smtp.example.com
    port: 587
    username: your-email@example.com
    password: your-app-password
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: 5000
          starttls:
            enable: true
          timeout: 5000
          writetimeout: 5000

buddies:
  mail:
    from: your-email@example.com
    signup-subject: Buddies 인증 코드
    password-reset-subject: Buddies 비밀번호 재설정
  password-reset:
    url-template: https://localhost:8443/password-reset?token=%s
management:
  health:
    mail:
      enabled: false