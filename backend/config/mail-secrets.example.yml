spring:
  mail:
    host: smtp.example.com
    port: 587
    username: your-email@example.com
    password: your-app-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

buddies:
  mail:
    from: your-email@example.com
    signup-subject: Buddies 인증 코드
    password-reset-subject: Buddies 비밀번호 재설정
  password-reset:
    url-template: http://localhost:5173/password-reset?token=%s
